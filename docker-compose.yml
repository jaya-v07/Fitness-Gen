version: '3.8'

services:
  # 1. FastAPI Backend Service
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # Live syncs code changes so you don't have to rebuild
    environment:
      - ENV=development
      - PYTHONPATH=/app

  # 2. React Frontend Service
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevents local node_modules from overwriting container
    depends_on:
      - backend